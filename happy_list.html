<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>幸福物品管理系统（Supabase）</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: linear-gradient(135deg, #fff5f5 0%, #ffe0e5 100%);
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .section {
        background: rgba(255, 255, 255, 0.8);
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 25px;
        box-shadow: 0 8px 32px rgba(255,105,180,0.15);
    }

    h2 {
        text-align: center;
        color: #db7093;
    }

    h3 {
        color: #db7093;
        margin-top: 0;
    }

    textarea, input[type="text"] {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 12px;
        font-size: 16px;
        border: 2px solid #ffb6c1;
        border-radius: 8px;
        box-sizing: border-box;
    }

    button {
        padding: 10px 20px;
        margin-right: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .btn-primary {
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        color: #333;
    }

    .btn-secondary {
        background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        color: #333;
    }

    .result {
        margin-top: 20px;
        line-height: 1.8;
    }

    .happy {
        color: #ff69b4;
        font-weight: bold;
    }

    .warning {
        color: #ff6b6b;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🌸 幸福物品管理系统 🌸</h2>

    <div class="section">
        <h3>🔍 批量查询</h3>
        <textarea id="searchInput" placeholder="每行一个物品"></textarea><br>
        <button class="btn-primary" onclick="batchCheck()">查询</button>
        <button class="btn-secondary" onclick="clearSearch()">清空</button>
        <div id="result" class="result"></div>
    </div>

    <div class="section">
        <h3>➕ 添加幸福物品</h3>
        <input id="itemName" placeholder="物品名称">
        <input id="itemReason" placeholder="幸福原因">
        <br>
        <button class="btn-primary" onclick="addItem()">添加</button>
    </div>

    <div class="section">
        <h3>📊 统计</h3>
        <div id="statsDisplay"></div>
        <button class="btn-secondary" onclick="randomHappy()">随机推荐</button>
    </div>
</div>

<script>
/* ===== Supabase 初始化（完全照抄你那份） ===== */
const { createClient } = supabase;

const db = createClient(
    "https://dpytpfmxsaepftvixuks.supabase.co",
    "sb_publishable_kleb3hNkq8W3cCU5XYxGMQ_ZWyYLb76"
);

async function updateStats() {
    const { count } = await db
        .from('happy_items')
        .select('*', { count: 'exact', head: true });

    document.getElementById("statsDisplay").innerHTML =
        `<span class="happy">💖 当前共有 <b>${count}</b> 件幸福物品</span>`;
}

async function addItem() {
    const name = document.getElementById("itemName").value.trim();
    const reason = document.getElementById("itemReason").value.trim();

    if (!name || !reason) {
        alert("名称和原因不能为空");
        return;
    }

    const { error } = await db
        .from('happy_items')
        .insert([{ name, reason }]);

    if (error) {
        alert("添加失败：" + error.message);
        return;
    }

    alert("✨ 添加成功");
    updateStats();
}

async function batchCheck() {
    const input = document.getElementById("searchInput").value;
    const keywords = input.split(/\n/).map(k => k.trim()).filter(Boolean);
    let out = "";

    for (const k of keywords) {
        const { data } = await db
            .from('happy_items')
            .select('name, reason')
            .ilike('name', `%${k}%`);

        if (!data.length) {
            out += `<div class="warning">💔 未找到：${k}</div>`;
        } else {
            data.forEach(i => {
                out += `<div class="happy">💖 ${i.name}：${i.reason}</div>`;
            });
        }
    }

    document.getElementById("result").innerHTML = out;
}

async function randomHappy() {
    const { data } = await db.from('happy_items').select('*');
    if (!data.length) return alert("暂无数据");

    const i = data[Math.floor(Math.random() * data.length)];
    document.getElementById("result").innerHTML =
        `<div class="happy" style="text-align:center;">
            🎁 今日推荐<br>
            <b>${i.name}</b><br>
            ${i.reason}
        </div>`;
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("result").innerHTML = "";
}

updateStats();
</script>

</body>
</html>
