<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>幸福物品管理系统</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: linear-gradient(135deg, #fff5f5 0%, #ffe0e5 100%);
    }

    textarea, input[type="text"] {
        width: 90%;
        padding: 10px;
        margin-bottom: 10px;
        font-size: 16px;
        border: 2px solid #ffb6c1;
        border-radius: 4px;
    }

    textarea:focus, input[type="text"]:focus {
        outline: none;
        border-color: #ff69b4;
    }

    button {
        padding: 8px 14px;
        margin-right: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn-primary {
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        color: #333;
    }

    .btn-secondary {
        background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        color: #333;
    }

    .btn-danger {
        background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        color: #333;
    }

    .section {
        background: white;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        box-shadow: 0 2px 10px rgba(255,105,180,0.1);
    }

    h3 {
        margin-top: 0;
        color: #db7093;
    }

    .result {
        margin-top: 20px;
        line-height: 1.8;
    }

    .warning {
        color: #ff6b6b;
        font-weight: bold;
    }

    .safe {
        color: #51cf66;
        font-weight: bold;
    }

    .happy {
        color: #ff69b4;
        font-weight: bold;
    }

    .header-title {
        text-align: center;
        color: #db7093;
        margin-bottom: 30px;
    }

    .emoji-big {
        font-size: 24px;
    }
</style>
</head>

<body>

<h2 class="header-title">🌸 幸福物品管理系统 🌸</h2>

<!-- 查询区 -->
<div class="section">
    <h3>🔍 批量查询（每行一个物品）</h3>
    <textarea id="searchInput" placeholder="例如：
奶茶
毛毯
猫咪"></textarea><br>
    <button class="btn-primary" onclick="batchCheck()">查询</button>
    <button class="btn-danger" onclick="clearSearch()">清空</button>
</div>

<!-- 添加区 -->
<div class="section">
    <h3>➕ 添加新幸福物品</h3>
    <input id="newItem" placeholder="物品名称（如：热可可）"><br><br>
    <input id="newReason" placeholder="幸福原因（如：温暖治愈，缓解焦虑）"><br><br>
    <button class="btn-primary" onclick="addItem()">添加</button>
</div>

<!-- 统计区 -->
<div class="section">
    <h3>📊 幸福统计</h3>
    <div id="statsDisplay" class="result"></div>
    <button class="btn-secondary" onclick="showRandomHappy()">随机推荐幸福物品</button>
</div>

<div id="result" class="result"></div>

<script>
let happyList = {
    "厚棉被": "包裹感很强，安全感满满",
    "骨传导耳机": "戴上就能拥有自己的小世界",
    "保温杯": "随时都有热水喝",
    "柔软的睡衣": "回家换上瞬间放松",
    "巧克力": "甜食让人快乐",
    "润唇膏": "嘴巴不干，心情不燥",
    "软底拖鞋": "走路轻盈，脚丫舒服",
    "暖宝宝贴": "贴在腰上肚子上很暖和"
};

/* =========================
   更新统计显示
   ========================= */
function updateStats() {
    const statsDiv = document.getElementById("statsDisplay");
    const count = Object.keys(happyList).length;
    statsDiv.innerHTML = `<span class="happy">💖 当前共有 <b>${count}</b> 件幸福物品</span>`;
}

/* =========================
   添加新幸福物品
   ========================= */
function addItem() {
    const item = document.getElementById("newItem").value.trim();
    const reason = document.getElementById("newReason").value.trim();
    const resultDiv = document.getElementById("result");

    if (!item || !reason) {
        alert("物品名称和幸福原因都不能为空！");
        return;
    }

    if (happyList[item]) {
        alert(`⚠️ 「${item}」已经存在于幸福清单中`);
        return;
    }

    happyList[item] = reason;

    resultDiv.innerHTML = `
        <div class="happy">
            ✨ 已成功添加幸福物品：<b>${item}</b><br>
            理由：${reason}
        </div>
    `;

    document.getElementById("newItem").value = "";
    document.getElementById("newReason").value = "";
    
    updateStats();
}

/* =========================
   批量 + 模糊 + 多重查询（按行）
   ========================= */
function batchCheck() {
    const input = document.getElementById("searchInput").value;
    const resultDiv = document.getElementById("result");

    if (!input.trim()) {
        resultDiv.innerHTML = "<span class='warning'>⚠️ 请输入至少一个物品</span>";
        return;
    }

    // ✅ 按换行拆分
    const keywords = input
        .split(/\n/)
        .map(k => k.trim())
        .filter(Boolean);

    let output = "";

    keywords.forEach(keyword => {
        let matchedCount = 0;

        output += `<hr><b>🔍 查询关键词：</b>${keyword}<br>`;

        for (let item in happyList) {
            if (
                item.includes(keyword) ||
                keyword.includes(item)
            ) {
                output += `<div class="happy">
                    💖 ${item}：幸福源泉（${happyList[item]}）
                </div>`;
                matchedCount++;
            }
        }

        if (matchedCount === 0) {
            output += `<div class="warning">💔 未找到相关幸福物品，要不要添加一个？</div>`;
        }
    });

    resultDiv.innerHTML = output;
}

/* =========================
   随机推荐幸福物品
   ========================= */
function showRandomHappy() {
    const items = Object.keys(happyList);
    if (items.length === 0) {
        alert("还没有添加任何幸福物品哦！");
        return;
    }
    
    const randomItem = items[Math.floor(Math.random() * items.length)];
    const resultDiv = document.getElementById("result");
    
    resultDiv.innerHTML = `
        <div class="happy" style="text-align: center; padding: 20px;">
            <span class="emoji-big">🎁</span><br>
            <b>今日幸福推荐：</b><br>
            <span style="font-size: 20px;">${randomItem}</span><br>
            <small>理由：${happyList[randomItem]}</small>
        </div>
    `;
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("result").innerHTML = "";
}

// 页面加载时显示统计
updateStats();
</script>

</body>
</html>
