<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>买菜系统（大字版）</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ================= 基础样式 ================= */
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  padding: 15px;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* ===== 默认：桌面端左右两栏 ===== */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

h2 {
  border-left: 5px solid #4da3ff;
  padding-left: 10px;
  font-size: 22px;
  margin-top: 0;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #4da3ff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

.result {
  margin-top: 15px;
  padding: 15px;
  background: #f1f5fb;
  border-radius: 8px;
}

.list-item {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.item-main {
  flex: 1;
}

.item-price {
  font-size: 14px;
  color: #2ecc71;
  margin-top: 4px;
}

.delete {
  color: #ff6b6b;
  cursor: pointer;
  margin-left: 10px;
  font-size: 16px;
}

/* ================= 模式切换按钮 ================= */
#modeToggle {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #333;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  z-index: 9999;
}

/* ======================================================
   ✅✅✅ 强制手机模式（无视浏览器设置）✅✅✅
====================================================== */
body.force-mobile .main-layout {
  grid-template-columns: 1fr !important;
}

body.force-mobile h2 {
  font-size: 28px;
}

body.force-mobile input,
body.force-mobile button {
  font-size: 24px !important;
  padding: 20px !important;
}

body.force-mobile .card {
  padding: 25px 18px !important;
}

body.force-mobile .item-price {
  font-size: 20px !important;
  margin-top: 8px;
}

body.force-mobile .delete {
  font-size: 26px;
}
</style>
</head>

<body>

<!-- ✅ 模式切换按钮 -->
<div id="modeToggle" onclick="toggleMode()">🖥️ 桌面模式</div>

<div class="container">

  <!-- ===== 左右两栏容器 ===== -->
  <div class="main-layout">

    <!-- 左：菜价系统 -->
    <div class="card">
      <h2>🥬 菜价计算</h2>

      <input id="searchName" placeholder="菜名">
      <button onclick="searchItem()">🔍 搜索菜名</button>

      <input id="inputPrice" type="number" placeholder="图片价格（元/kg）">
      <button onclick="saveItem()">💾 保存并查看价格</button>

      <div id="calcResult" class="result"></div>
    </div>

    <!-- 右：购物清单 -->
    <div class="card">
      <h2>🛒 购物清单</h2>

      <input id="shopInput" placeholder="输入菜名或商品">
      <button onclick="addShop()">添加</button>

      <div id="shopList"></div>
    </div>

  </div>
</div>

<script>
/* ================= 全局 Supabase ================= */
const { createClient } = supabase;
const db = createClient(
  "https://dpytpfmxsaepftvixuks.supabase.co",
  "sb_publishable_kleb3hNkq8W3cCU5XYxGMQ_ZWyYLb76"
);

/* ================= 菜价计算 ================= */
function calcRange(input) {
  return {
    low: (input / 2) * 1.3,
    high: (input / 2) * 2.0
  };
}

/* ================= 搜索菜价 ================= */
async function searchItem() {
  const name = document.getElementById("searchName").value.trim();
  const box = document.getElementById("calcResult");

  if (!name) {
    box.innerText = "请输入菜名";
    return;
  }

  const { data } = await db
    .from("grocery_items")
    .select("*")
    .ilike("name", `%${name}%`)
    .limit(1);

  if (!data.length) {
    box.innerText = "❌ 未找到该菜价";
    return;
  }

  const i = data[0];
  box.innerHTML = `
    ✅ ${i.name}<br>
    输入价：${i.input_value} 元/kg<br>
    输出价：${i.low_price.toFixed(2)} ~ ${i.high_price.toFixed(2)} 元/斤
  `;
}

/* ================= 保存菜价 ================= */
async function saveItem() {
  const name = document.getElementById("searchName").value.trim();
  const price = parseFloat(document.getElementById("inputPrice").value);
  const box = document.getElementById("calcResult");

  if (!name || isNaN(price)) {
    box.innerText = "请填写完整信息";
    return;
  }

  const { low, high } = calcRange(price);

  await db.from("grocery_items").insert({
    name,
    input_value: price,
    low_price: low,
    high_price: high
  });

  box.innerHTML = `
    ✅ 已保存<br>
    ${name}：${low.toFixed(2)} ~ ${high.toFixed(2)} 元/斤
  `;

  document.getElementById("inputPrice").value = "";
}

/* ================= 购物清单 ================= */
async function addShop() {
  const input = document.getElementById("shopInput");
  const content = input.value.trim();
  if (!content) return;

  await db.from("shopping_list").insert({ content });
  input.value = "";
  loadShop();
}

async function getPriceInfo(name) {
  const { data } = await db
    .from("grocery_items")
    .select("low_price, high_price")
    .eq("name", name)
    .limit(1);

  return data?.[0] || null;
}

async function loadShop() {
  const today = new Date().toISOString().slice(0,10);

  const { data } = await db
    .from("shopping_list")
    .select("*")
    .eq("created_at", today);

  const list = document.getElementById("shopList");
  list.innerHTML = "";

  for (const i of data || []) {
    const price = await getPriceInfo(i.content);

    list.innerHTML += `
      <div class="list-item">
        <div class="item-main">
          <div>${i.content}</div>
          ${
            price
              ? `<div class="item-price">
                  价格参考：${price.low_price.toFixed(2)} ~ ${price.high_price.toFixed(2)} 元/斤
                </div>`
              : ""
          }
        </div>
        <span class="delete" onclick="deleteShop('${i.id}')">🗑</span>
      </div>
    `;
  }
}

async function deleteShop(id) {
  await db.from("shopping_list").delete().eq("id", id);
  loadShop();
}

/* ================= 自动清理（仅购物清单） ================= */
(async () => {
  await db
    .from("shopping_list")
    .delete()
    .neq("created_at", new Date().toISOString().slice(0,10));

  loadShop();
})();

/* ================= 强制布局检测 ================= */
const modeBtn = document.getElementById("modeToggle");
const width = window.innerWidth;

function applyMode(mode) {
  if (mode === "mobile" || width <= 768) {
    document.body.classList.add("force-mobile");
    modeBtn.innerText = "📱 手机模式";
  } else {
    document.body.classList.remove("force-mobile");
    modeBtn.innerText = "🖥️ 桌面模式";
  }
  localStorage.setItem("layoutMode", mode);
}

function toggleMode() {
  const current = localStorage.getItem("layoutMode") || "desktop";
  applyMode(current === "desktop" ? "mobile" : "desktop");
}

/* ===== 页面加载时强制执行 ===== */
window.addEventListener("load", () => {
  const saved = localStorage.getItem("layoutMode");
  if (saved) {
    applyMode(saved);
  } else {
    applyMode(width <= 768 ? "mobile" : "desktop");
  }
});
</script>

</body>
</html>
