<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>避雷物品管理系统（Supabase）</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background: linear-gradient(135deg, #e0f7fa 0%, #f1f8e9 100%);
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .section {
        background: rgba(255, 255, 255, 0.8);
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 25px;
        box-shadow: 0 8px 32px rgba(33,150,243,0.15);
    }

    h2 {
        text-align: center;
        color: #0288d1;
    }

    h3 {
        color: #0288d1;
        margin-top: 0;
    }

    textarea, input[type="text"] {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 12px;
        font-size: 16px;
        border: 2px solid #81d4fa;
        border-radius: 8px;
        box-sizing: border-box;
    }

    button {
        padding: 10px 20px;
        margin-right: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .btn-primary {
        background: linear-gradient(135deg, #81d4fa 0%, #b2ebf2 100%);
        color: #333;
    }

    .btn-secondary {
        background: linear-gradient(135deg, #aed581 0%, #dcedc8 100%);
        color: #333;
    }

    .result {
        margin-top: 20px;
        line-height: 1.8;
    }

    .warning {
        color: #ff6b6b;
        font-weight: bold;
    }

    .safe {
        color: #43a047;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🛑 避雷物品管理系统 🛑</h2>

    <div class="section">
        <h3>🔍 批量查询</h3>
        <textarea id="searchInput" placeholder="每行一个物品"></textarea><br>
        <button class="btn-primary" onclick="batchCheck()">查询</button>
        <button class="btn-secondary" onclick="clearSearch()">清空</button>
        <div id="result" class="result"></div>
    </div>

    <div class="section">
        <h3>➕ 添加避雷物品</h3>
        <input id="itemName" placeholder="物品名称">
        <input id="itemReason" placeholder="避雷原因">
        <br>
        <button class="btn-primary" onclick="addItem()">添加</button>
    </div>

    <div class="section">
        <h3>📊 统计</h3>
        <div id="statsDisplay"></div>
    </div>
</div>

<script>
const { createClient } = supabase;

const db = createClient(
    "https://dpytpfmxsaepftvixuks.supabase.co",
    "sb_publishable_kleb3hNkq8W3cCU5XYxGMQ_ZWyYLb76"
);

async function updateStats() {
    const { count } = await db
        .from('avoid_items')
        .select('*', { count: 'exact', head: true });

    document.getElementById("statsDisplay").innerHTML =
        `<span class="safe">🛑 当前共有 <b>${count}</b> 条避雷物品</span>`;
}

async function addItem() {
    const name = document.getElementById("itemName").value.trim();
    const reason = document.getElementById("itemReason").value.trim();

    if (!name || !reason) {
        alert("名称和原因不能为空");
        return;
    }

    const { error } = await db
        .from('avoid_items')
        .insert([{ name, reason }]);

    if (error) {
        alert("添加失败：" + error.message);
        return;
    }

    alert("✅ 添加成功");
    updateStats();
}

async function batchCheck() {
    const input = document.getElementById("searchInput").value;
    const keywords = input.split(/\n/).map(k => k.trim()).filter(Boolean);
    let out = "";

    for (const k of keywords) {
        const { data } = await db
            .from('avoid_items')
            .select('name, reason')
            .ilike('name', `%${k}%`);

        if (!data.length) {
            out += `<div class="safe">✅ 未找到：${k}</div>`;
        } else {
            data.forEach(i => {
                out += `<div class="warning">❌ ${i.name}：${i.reason}</div>`;
            });
        }
    }

    document.getElementById("result").innerHTML = out;
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("result").innerHTML = "";
}

updateStats();
</script>

</body>
</html>
