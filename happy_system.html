<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>幸福管理系统</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  margin: 0;
}

h1, h2 { text-align: center; }
.hidden { display: none; }

.back {
  cursor: pointer;
  color: #4da3ff;
  margin: 15px;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
  max-width: 600px;
  margin: 50px auto;
}

.card {
  padding: 40px;
  border-radius: 16px;
  color: white;
  font-size: 20px;
  text-align: center;
  cursor: pointer;
}

.blue   { background: #4da3ff; }
.green  { background: #5cd88c; }
.orange { background: #ffb347; }
.purple { background: #9b7cff; }

.card-container, .trip-container {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.action-card, .trip-card {
  width: 260px;
  background: #fff;
  border-radius: 14px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.action-card h3, .trip-card h3 {
  margin-top: 0;
  font-size: 18px;
}

.delete-btn {
  color: #ff6b6b;
  cursor: pointer;
  font-size: 14px;
}

.action-item, .trip-item {
  margin: 10px 0;
}

input[type="datetime-local"],
input[type="time"] {
  width: 100%;
  margin-top: 4px;
}

.btn-group {
  text-align: center;
  margin: 30px 0;
}

button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #4da3ff;
  color: white;
  cursor: pointer;
}

.panel {
  max-width: 700px;
  margin: 0 auto 40px;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.today-highlight {
  color: #2ecc71 !important;
  font-weight: bold;
}

/* ================= 移动端适配 ================= */
@media screen and (max-width: 600px) {
  body { font-size: 16px; }

  .dashboard {
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 0 10px;
    box-sizing: border-box;
  }

  .card {
    padding: 30px 15px;
    font-size: 18px;
  }

  .card-container,
  .trip-container {
    flex-direction: column;
    align-items: center;
  }

  .action-card,
  .trip-card {
    width: 90%;
    max-width: 320px;
    padding: 12px;
  }

  .action-card h3,
  .trip-card h3 {
    font-size: 16px;
  }

  .action-item {
    font-size: 14px;
  }

  input[type="time"],
  button {
    height: 36px;
    font-size: 14px;
  }

  .panel {
    margin: 10px;
    padding: 15px;
  }

  h1 { font-size: 24px; }
  h2 { font-size: 20px; }
}
</style>
</head>

<body>

<!-- 首页 -->
<div id="home">
  <h1>幸福管理系统</h1>
  <div class="dashboard">
    <div class="card blue" onclick="show('actions')">微行动打卡</div>
    <div class="card green" onclick="show('tripGoals')">旅途目标</div>
    <div class="card purple" onclick="show('journeyHarvest')">旅途收获</div>
    <div class="card orange" onclick="show('happiness')">幸福指数</div>
  </div>
</div>

<!-- 微行动打卡 -->
<div id="actions" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>微行动打卡</h2>

  <div class="card-container">
    <div id="card-life" class="action-card"></div>
    <div id="card-social" class="action-card"></div>
    <div id="card-self" class="action-card"></div>
  </div>

  <div class="btn-group">
    <button onclick="show('feedbackPage')">今日反馈</button>
  </div>
</div>

<!-- 今日反馈 -->
<div id="feedbackPage" class="hidden">
  <div class="back" onclick="show('actions')">⬅ 返回微行动</div>
  <h2>今日反馈</h2>
  <div class="panel" id="feedback"></div>
</div>

<!-- 旅途目标 -->
<div id="tripGoals" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>旅途目标</h2>

  <div class="trip-container">
    <div id="todayGoals" class="trip-card"></div>
    <div id="nearGoals" class="trip-card"></div>
    <div id="farGoals" class="trip-card"></div>
  </div>
</div>

<!-- 旅途收获 -->
<div id="journeyHarvest" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>旅途收获</h2>

  <div class="dashboard">
    <div class="card green" onclick="openHappyItem()">幸福物品清单</div>
    <div class="card orange" onclick="openLeiDan()">避雷物品清单</div>
    <div class="card blue" onclick="openMoodDiary()">心情日记</div>
    <div class="card purple" onclick="openEntertainmentList()">娱乐清单</div>
    <div class="card purple" onclick="openKnowledgeSystem()">知识管理系统</div>
  </div>
</div>

<!-- 幸福指数 -->
<div id="happiness" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>幸福指数</h2>

  <div class="panel">
    <h3>今日幸福指数</h3>
    <p id="dailyHappiness" style="font-size:24px;color:#4da3ff;"></p>

    <h3 style="margin-top:30px;">本周幸福指数</h3>
    <p id="weeklyHappiness" style="font-size:24px;color:#5cd88c;"></p>
  </div>
</div>

<script>
/* ================= Supabase 初始化 ================= */
const { createClient } = supabase;
const db = createClient(
  "https://dpytpfmxsaepftvixuks.supabase.co",
  "sb_publishable_kleb3hNkq8W3cCU5XYxGMQ_ZWyYLb76"
);

/* ================= 基础工具 ================= */
function show(page) {
  document.querySelectorAll("body > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");

  if (page === "actions") renderCards();
  if (page === "tripGoals") renderTripGoals();
  if (page === "feedbackPage") updateFeedback();
  if (page === "happiness") renderHappiness();
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekDates() {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1);
  return Array.from({length:7}, (_,i)=>{
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
}

/* ================= 微行动定义 ================= */
async function loadActions() {
  const { data } = await db.from("action_definitions").select("*");
  const result = { "生活": [], "社会化": [], "自我期许": [] };
  data?.forEach(r => result[r.category].push(r.name));
  return result;
}

/* ================= ✅ 修复点：只加载今天的记录 ================= */
async function loadTodayRecords() {
  const today = getTodayKey();
  const { data } = await db
    .from("action_records")
    .select("*")
    .eq("date", today);

  const map = {};
  data?.forEach(r => map[r.action_name] = { time: r.time, note: r.note });
  return map;
}

/* ================= 微行动卡片 ================= */
async function renderCards() {
  const actions = await loadActions();
  const todayRecs = await loadTodayRecords();
  const today = getTodayKey();

  const { data: tg } = await db.from("trip_goals").select("*");
  const todayGoals = tg?.filter(g => g.type === "today") || [];

  const render = (cat, id) => {
    const c = document.getElementById(id);
    c.innerHTML = `<h3 style="display:flex;justify-content:space-between;align-items:center;">
      ${cat}
      <span style="cursor:pointer;font-size:22px;" onclick="addAction('${cat}')">➕</span>
    </h3>`;

    actions[cat].forEach(name => {
      const rec = todayRecs[name];
      const checked = !!rec;
      const isTodayGoal = todayGoals.some(g => g.name === name);

      c.innerHTML += `
        <div class="action-item">
          <label>
            <input type="checkbox" ${checked?"checked":""}
              onchange="toggle('${name}')">
            <span class="${isTodayGoal ? 'today-highlight' : ''}">${name}</span>
          </label>
          <input type="time" value="${rec?.time||''}"
            onchange="setTime('${name}',this.value)">
          <div style="margin-top:6px;">
            <span class="delete-btn" onclick="editNote('${name}')">📝</span>
            <span class="delete-btn" onclick="deleteAction('${name}','${cat}')">🗑</span>
          </div>
          ${rec?.note ? `<div style="font-size:13px;color:#666;">📌 ${rec.note}</div>` : ""}
        </div>
      `;
    });
  };

  render("生活","card-life");
  render("社会化","card-social");
  render("自我期许","card-self");
}

/* ================= 微行动 CRUD ================= */
async function addAction(cat) {
  const name = prompt(`请输入新的微行动（${cat}）：`);
  if (!name) return;
  await db.from("action_definitions").insert({ category: cat, name });
  renderCards();
}

async function deleteAction(name, cat) {
  if (!confirm(`删除「${name}」？`)) return;
  await db.from("action_definitions").delete().eq("name", name);
  renderCards();
}

async function toggle(name) {
  const today = getTodayKey();
  const rec = await db
    .from("action_records")
    .select("id")
    .eq("action_name", name)
    .eq("date", today)
    .single();

  if (rec.data) {
    await db.from("action_records")
      .delete()
      .eq("action_name", name)
      .eq("date", today);
  } else {
    await db.from("action_records").insert({
      action_name: name,
      date: today,
      time: new Date().toTimeString().slice(0,5)
    });
  }
  renderCards();
  renderHappiness();
}

async function setTime(name, val) {
  const today = getTodayKey();
  await db.from("action_records").upsert(
    { action_name: name, date: today, time: val },
    { onConflict: ["action_name","date"] }
  );
}

async function editNote(name) {
  const note = prompt("请输入备注：", "");
  const today = getTodayKey();
  await db.from("action_records").upsert(
    { action_name: name, date: today, note },
    { onConflict: ["action_name","date"] }
  );
  renderCards();
}

/* ================= 今日反馈 ================= */
async function updateFeedback() {
  const today = getTodayKey();
  const todayRecs = await loadTodayRecords();

  const fb = document.getElementById("feedback");
  fb.innerHTML = Object.keys(todayRecs).length
    ? Object.keys(todayRecs).map(n => `<p>✔ ${n}</p>`).join("")
    : "<p>暂无今日打卡</p>";
}

/* ================= 幸福指数 ================= */
async function renderHappiness() {
  const today = getTodayKey();
  const week = getWeekDates();
  const { data } = await db.from("action_records").select("*");

  let daily = 0, weekly = 0;
  data?.forEach(r => {
    if (r.date === today) daily++;
    if (week.includes(r.date)) weekly++;
  });

  document.getElementById("dailyHappiness").innerText = daily + " 分";
  document.getElementById("weeklyHappiness").innerText = weekly + " 分";
}

/* ================= 旅途目标 ================= */
async function renderTripGoals() {
  const { data } = await db.from("trip_goals").select("*");
  const goals = { today: [], near: [], far: [] };
  data?.forEach(g => goals[g.type].push(g));

  const render = (type, id) => {
    const c = document.getElementById(id);
    c.innerHTML = `<h3>${type==="today"?"今日":type==="near"?"近期":"远期"}目标
      <span style="cursor:pointer;font-size:22px;" onclick="addTripGoal('${type}')">➕</span>
    </h3>`;
    goals[type].forEach((g, i) => {
      c.innerHTML += `<div class="trip-item">
        ${g.name}
        ${g.start_date ? `(${g.start_date} ~ ${g.end_date})` : ""}
        <span class="delete-btn" onclick="deleteTripGoal(${g.id})">🗑</span>
      </div>`;
    });
  };

  render("today","todayGoals");
  render("near","nearGoals");
  render("far","farGoals");

  checkTripGoalReminder([...goals.near, ...goals.far]);
}

async function addTripGoal(type) {
  if (type === "today") {
    const actions = await loadActions();
    const list = Object.values(actions).flat();
    const name = prompt("请从已有微行动中选择今日目标：\n" + list.join("\n"));
    if (!list.includes(name)) {
      alert("只能选择已有微行动");
      return;
    }
    await db.from("trip_goals").insert({ type, name });
  } else {
    const name = prompt("目标名称：");
    const start = prompt("开始日期（YYYY-MM-DD）：");
    const end = prompt("结束日期（YYYY-MM-DD）：");
    if (!name || !start || !end) return;
    await db.from("trip_goals").insert({ type, name, start_date: start, end_date: end });
  }
  renderTripGoals();
  renderCards();
}

async function deleteTripGoal(id) {
  await db.from("trip_goals").delete().eq("id", id);
  renderTripGoals();
  renderCards();
}

function checkTripGoalReminder(goals) {
  const today = getTodayKey();
  goals.forEach(g => {
    if (!g.start_date || !g.end_date) return;
    if (g.start_date === today) alert(`🚀 目标开始：${g.name}`);
    if (g.end_date === today) alert(`🏁 目标结束：${g.name}`);
  });
}

/* ================= 外部链接 ================= */
function openLeiDan() {
  window.open("https://xiaohongying.github.io/adv_list.html", "_blank");
}
function openHappyItem() {
  window.open("https://xiaohongying.github.io/happy_list.html", "_blank");
}
function openEntertainmentList() {
  window.open("https://xiaohongying.github.io/entertainment_list.html", "_blank");
}
function openKnowledgeSystem() {
  window.open("https://www.yuque.com/dashboard", "_blank");
  window.open("https://mubu.com/app", "_blank");
}
function openMoodDiary() {
  window.open("https://xiaohongying.github.io/mood_diary.html", "_blank");
}

/* ================= 初始化 ================= */
renderCards();
</script>

</body>
</html>
