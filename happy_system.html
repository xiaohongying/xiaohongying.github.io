<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>幸福管理系统</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #f5f7fa;
  margin: 0;
}

h1, h2 { text-align: center; }
.hidden { display: none; }

.back {
  cursor: pointer;
  color: #4da3ff;
  margin: 15px;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 30px;
  max-width: 600px;
  margin: 50px auto;
}

.card {
  padding: 40px;
  border-radius: 16px;
  color: white;
  font-size: 20px;
  text-align: center;
  cursor: pointer;
}

.blue   { background: #4da3ff; }
.green  { background: #5cd88c; }
.orange { background: #ffb347; }
.purple { background: #9b7cff; }

.card-container, .trip-container {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.action-card, .trip-card {
  width: 260px;
  background: #fff;
  border-radius: 14px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.action-card h3, .trip-card h3 {
  margin-top: 0;
  font-size: 18px;
}

.delete-btn {
  color: #ff6b6b;
  cursor: pointer;
  font-size: 14px;
}

.action-item, .trip-item {
  margin: 10px 0;
}

input[type="datetime-local"] {
  width: 100%;
  margin-top: 4px;
}

.btn-group {
  text-align: center;
  margin: 30px 0;
}

button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #4da3ff;
  color: white;
  cursor: pointer;
}

.panel {
  max-width: 700px;
  margin: 0 auto 40px;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.today-highlight {
  color: #2ecc71 !important;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- 首页 -->
<div id="home">
  <h1>幸福管理系统</h1>
  <div class="dashboard">
    <div class="card blue" onclick="show('actions')">微行动打卡</div>
    <div class="card green" onclick="show('tripGoals')">旅途目标</div>
    <div class="card purple" onclick="show('journeyHarvest')">旅途收获</div>
    <div class="card orange" onclick="show('happiness')">幸福指数</div>
  </div>
</div>

<!-- 微行动打卡 -->
<div id="actions" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>微行动打卡</h2>

  <div class="card-container">
    <div id="card-life" class="action-card"></div>
    <div id="card-social" class="action-card"></div>
    <div id="card-self" class="action-card"></div>
  </div>

  <div class="btn-group">
    <button onclick="show('feedbackPage')">今日反馈</button>
    <button onclick="show('chartPage')">本周完成趋势</button>
  </div>
</div>

<!-- 今日反馈 -->
<div id="feedbackPage" class="hidden">
  <div class="back" onclick="show('actions')">⬅ 返回微行动</div>
  <h2>今日反馈</h2>
  <div class="panel" id="feedback"></div>
</div>

<!-- 本周趋势 -->
<div id="chartPage" class="hidden">
  <div class="back" onclick="show('actions')">⬅ 返回微行动</div>
  <h2>本周完成趋势</h2>
  <div class="panel">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- 旅途目标 -->
<div id="tripGoals" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>旅途目标</h2>

  <div class="trip-container">
    <div id="todayGoals" class="trip-card"></div>
    <div id="nearGoals" class="trip-card"></div>
    <div id="farGoals" class="trip-card"></div>
  </div>
</div>

<!-- 旅途收获 -->
<div id="journeyHarvest" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>旅途收获</h2>

  <div class="dashboard">
    <div class="card green" onclick="openHappyItem()">幸福物品清单</div>
    <div class="card orange" onclick="openLeiDan()">避雷物品清单</div>
    <div class="card blue" onclick="openMoodDiary()">心情日记</div>
    <div class="card black" onclick="openEntertainmentList()">知识管理系统</div>
    <div class="card purple" onclick="openKnowledgeSystem()">知识管理系统</div>
  </div>
</div>

<!-- ✅ 幸福指数 -->
<div id="happiness" class="hidden">
  <div class="back" onclick="show('home')">⬅ 返回首页</div>
  <h2>幸福指数</h2>

  <div class="panel">
    <h3>今日幸福指数</h3>
    <p id="dailyHappiness" style="font-size:24px;color:#4da3ff;"></p>

    <h3 style="margin-top:30px;">本周幸福指数</h3>
    <p id="weeklyHappiness" style="font-size:24px;color:#5cd88c;"></p>
  </div>
</div>

<script>
/* ================= 基础数据 ================= */
const defaultActions = {
  "生活": ["睡觉","起床","吃饭","运动","洗澡","扫地","洗头","吹头发","洗衣服","做饭","丢垃圾","吃维生素片"],
  "社会化": ["出门","与人打招呼","与ai练习沟通表达","观看综艺节目","与人一起吃饭","整理工作流程","与人共餐"],
  "自我期许": ["写小说","摄入新知识","写代码","整理旧知识"]
};

const goals = { high: ["睡觉","起床","洗澡"], mid: ["做饭","丢垃圾","吃维生素片"], low: [] };
const actions = JSON.parse(localStorage.getItem("actionsConfig")) || JSON.parse(JSON.stringify(defaultActions));
const records = JSON.parse(localStorage.getItem("records")) || {};
const tripGoals = JSON.parse(localStorage.getItem("tripGoals")) || { today: [], near: [], far: [] };

/* ================= 工具函数 ================= */
function saveAll() {
  localStorage.setItem("actionsConfig", JSON.stringify(actions));
  localStorage.setItem("records", JSON.stringify(records));
  localStorage.setItem("tripGoals", JSON.stringify(tripGoals));
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekDates() {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1);
  return Array.from({length:7}, (_,i)=>{
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  });
}

function getGoal(name) {
  if (goals.high.includes(name)) return 6;
  if (goals.mid.includes(name)) return 5;
  return 3;
}

/* ================= 幸福指数 ================= */
function getDailyHappiness() {
  const today = getTodayKey();
  let count = 0;
  Object.values(records).forEach(rec => {
    if (rec.days && rec.days.includes(today)) {
      count++;
    }
  });
  return count;
}

function getWeeklyHappiness() {
  const week = getWeekDates();
  let total = 0;
  week.forEach(day => {
    Object.values(records).forEach(rec => {
      if (rec.days && rec.days.includes(day)) {
        total++;
      }
    });
  });
  return total;
}

/* ================= 页面切换 ================= */
function show(page) {
  document.querySelectorAll("body > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");

  if (page === "tripGoals") renderTripGoals();
  if (page === "feedbackPage") updateFeedback();
  if (page === "chartPage") drawChart();
  if (page === "happiness") renderHappiness();
}

/* ================= 微行动 ================= */
function renderCards() {
  renderCard("生活","card-life");
  renderCard("社会化","card-social");
  renderCard("自我期许","card-self");
}

function renderCard(cat, id) {
  const c = document.getElementById(id);
  c.innerHTML = `
    <h3 style="display:flex;justify-content:space-between;align-items:center;">
      ${cat}
      <span style="cursor:pointer;font-size:22px;" onclick="addActionTo('${cat}')">➕</span>
    </h3>
  `;

  actions[cat].forEach(name => {
    const rec = records[name] || { days: [] };
    const today = getTodayKey();
    const isCheckedToday = rec.days.includes(today);
    const isTodayGoal = tripGoals.today.includes(name);

    const div = document.createElement("div");
    div.className = "action-item";
    const textStyle = isTodayGoal
      ? 'class="today-highlight"'
      : (isCheckedToday ? 'style="color:green;"' : '');

    div.innerHTML = `
      <label>
        <input type="checkbox" ${isCheckedToday?"checked":""}
          onchange="toggle('${name}')">
        <span ${textStyle}>${name}</span>
      </label>
      <input type="datetime-local" value="${rec.time||''}"
        onchange="setTime('${name}',this.value)">
      <div style="margin-top:6px;">
        <span class="delete-btn" onclick="deleteAction('${name}','${cat}')">🗑 删除</span>
        <span style="color:#4da3ff;cursor:pointer;font-size:14px;"
          onclick="editNote('${name}')">📝 备注</span>
      </div>
      ${rec.note ? `<div style="font-size:13px;color:#666;">📌 ${rec.note}</div>` : ""}
    `;
    c.appendChild(div);
  });
}

function addActionTo(cat) {
  const name = prompt(`请输入新的微行动（${cat}）：`);
  if (!name) return;
  if (actions[cat].includes(name)) {
    alert("该微行动已存在");
    return;
  }
  actions[cat].push(name);
  records[name] = { days: [], time: "", note: "" };
  saveAll();
  renderCards();
}

function toggle(name) {
  if (!records[name]) records[name] = { days: [], time: "" };
  const rec = records[name];
  const today = getTodayKey();

  rec.days.includes(today)
    ? rec.days = rec.days.filter(d => d !== today)
    : rec.days.push(today);

  rec.time = rec.time || new Date().toISOString().slice(0,16);
  saveAll();
  renderCards();
}

function setTime(name, val) {
  records[name].time = val;
  saveAll();
}

function editNote(name) {
  const note = prompt("请输入备注：", records[name]?.note || "");
  if (note === null) return;
  records[name].note = note.trim() || null;
  saveAll();
  renderCards();
}

function deleteAction(name, cat) {
  if (!confirm(`删除「${name}」？`)) return;
  actions[cat] = actions[cat].filter(n => n !== name);
  delete records[name];
  saveAll();
  renderCards();
}

function updateFeedback() {
  const fb = document.getElementById("feedback");
  const today = getTodayKey();
  let html = "";
  Object.values(actions).flat().forEach(name => {
    if (records[name]?.days?.includes(today)) {
      html += `<p>✔ ${name}</p>`;
    }
  });
  fb.innerHTML = html || "<p>暂无今日打卡</p>";
}

function drawChart() {
  const labels = [];
  const targets = [];
  const actuals = [];
  const week = getWeekDates();

  Object.values(actions).flat().forEach(name => {
    labels.push(name);
    targets.push(getGoal(name));
    const rec = records[name] || {};
    actuals.push(week.filter(d => (rec.days||[]).includes(d)).length);
  });

  if (window.myChart) myChart.destroy();
  window.myChart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [
        { label: "目标次数", data: targets, backgroundColor: "#e0e0e0" },
        { label: "本周完成", data: actuals, backgroundColor: "#4da3ff" }
      ]
    },
    options: { indexAxis: "y", scales: { x: { beginAtZero: true, suggestedMax: 7 } } }
  });
}

/* ================= 旅途目标 ================= */
function renderTripGoals() {
  renderTodayGoals();
  renderNearGoals();
  renderFarGoals();
}

function renderTodayGoals() {
  const c = document.getElementById("todayGoals");
  c.innerHTML = `<h3>今日目标 <span style="cursor:pointer;font-size:22px;" onclick="addTodayGoal()">➕</span></h3>`;
  tripGoals.today.forEach((name, i) => {
    c.innerHTML += `<div class="trip-item">${name} <span class="delete-btn" onclick="removeTodayGoal(${i})">🗑</span></div>`;
  });
}

function addTodayGoal() {
  const all = Object.values(actions).flat();
  const name = prompt("从微行动中选择今日目标：\n" + all.join("\n"));
  if (!all.includes(name)) return;
  tripGoals.today.push(name);
  saveAll();
  renderTripGoals();
  renderCards();
}

function removeTodayGoal(i) {
  tripGoals.today.splice(i, 1);
  saveAll();
  renderTripGoals();
  renderCards();
}

function renderNearGoals() {
  const c = document.getElementById("nearGoals");
  c.innerHTML = `<h3>近期目标 <span style="cursor:pointer;font-size:22px;" onclick="addNearGoal()">➕</span></h3>`;
  tripGoals.near.forEach((g, i) => {
    c.innerHTML += `
      <div class="trip-item">
        <strong>${g.name}</strong><br>
        开始：${g.start}<br>
        结束：${g.end}
        <div class="delete-btn" onclick="removeNearGoal(${i})">🗑</div>
      </div>
    `;
  });
}

function addNearGoal() {
  const name = prompt("目标名称：");
  const start = prompt("开始时间（YYYY-MM-DD）：");
  const end = prompt("结束时间（YYYY-MM-DD）：");
  if (!name || !start || !end) return;
  tripGoals.near.push({ name, start, end });
  saveAll();
  renderTripGoals();
}

function removeNearGoal(i) {
  tripGoals.near.splice(i, 1);
  saveAll();
  renderTripGoals();
}

function renderFarGoals() {
  const c = document.getElementById("farGoals");
  c.innerHTML = `<h3>远期目标 <span style="cursor:pointer;font-size:22px;" onclick="addFarGoal()">➕</span></h3>`;
  tripGoals.far.forEach((g, i) => {
    c.innerHTML += `
      <div class="trip-item">
        <strong>${g.name}</strong><br>
        开始：${g.start}<br>
        结束：${g.end}
        <div class="delete-btn" onclick="removeFarGoal(${i})">🗑</div>
      </div>
    `;
  });
}

function addFarGoal() {
  const name = prompt("目标名称：");
  const start = prompt("开始时间：");
  const end = prompt("结束时间：");
  if (!name || !start || !end) return;
  tripGoals.far.push({ name, start, end });
  saveAll();
  renderTripGoals();
}

function removeFarGoal(i) {
  tripGoals.far.splice(i, 1);
  saveAll();
  renderTripGoals();
}

/* ================= 外部跳转 ================= */
function openLeiDan() {
  window.open("https://xiaohongying.github.io/adv_list.html", "_blank");
}

function openHappyItem() {
  window.open("https://xiaohongying.github.io/happy_list.html", "_blank");
}
function openEntertainmentList() {
  window.open("https://xiaohongying.github.io/entertainment_list.html", "_blank");
}

function openKnowledgeSystem() {
  window.open("https://www.yuque.com/dashboard", "_blank");
  window.open("https://mubu.com/app", "_blank");
}

function openMoodDiary() {
  window.open("https://xiaohongying.github.io/mood_diary.html", "_blank");
}

/* ================= 幸福指数页面 ================= */
function renderHappiness() {
  document.getElementById("dailyHappiness").innerText =
    getDailyHappiness() + " 分";

  document.getElementById("weeklyHappiness").innerText =
    getWeeklyHappiness() + " 分";
}

/* ================= 初始化 ================= */
renderCards();
</script>

</body>
</html>
